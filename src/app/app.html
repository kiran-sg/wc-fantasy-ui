<mat-toolbar class="toolbar" [class.hidden]="isLoginPage()">
  <a routerLink="/" class="brand">⚽ FUEL UP Fantasy League</a>
  <span class="spacer"></span>
  @if (auth.isLoggedIn()) {
    @if (auth.isAdmin()) {
      <a mat-button routerLink="/admin" class="nav-link admin-link">🛠 Admin</a>
      <a mat-button routerLink="/leaderboard" class="nav-link">Leaderboard</a>
    } @else {
      <a mat-button routerLink="/my-team" class="nav-link">My Team</a>
      <a mat-button routerLink="/leaderboard" class="nav-link">Leaderboard</a>
    }
    <span class="username">{{ auth.username() }}</span>
    <button mat-button class="nav-link" (click)="logout()">Logout</button>
  } @else {
    <a mat-button routerLink="/login" class="nav-link">Login</a>
  }
</mat-toolbar>

@if (loading.isLoading()) {
  <div class="global-overlay">
    <div class="overlay-bar"></div>
    <div class="spinner-card">
      <div class="css-spinner"></div>
    </div>
  </div>
}

<main class="container" [class.no-toolbar]="isLoginPage()" [class.wide]="isAdminPage()">
  <router-outlet />
</main>
